<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor de Salarios - ML</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
            padding-right: 40px;
        }

        .input-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .result.show {
            display: block;
        }

        .result h2 {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .result .salary {
            color: white;
            font-size: 42px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .error {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        .error.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }

            .result .salary {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">💰</div>
        <h1>Predictor de Salarios</h1>
        <p class="subtitle">Basado en Machine Learning</p>

        <form id="salaryForm">
            <div class="form-group">
                <label for="experience">Años de Experiencia</label>
                <input
                    type="number"
                    id="experience"
                    name="experience"
                    min="0"
                    max="15"
                    step="0.1"
                    required
                    placeholder="Ejemplo: 5.0"
                >
                <div class="input-hint">Ingresa entre 0 y 15 años</div>
            </div>

            <div class="form-group">
                <label for="education">Nivel de Educación</label>
                <select id="education" name="education" required>
                    <option value="">Selecciona una opción</option>
                    <option value="Bachelor's">Bachelor's (Licenciatura)</option>
                    <option value="Master's">Master's (Maestría)</option>
                    <option value="PhD">PhD (Doctorado)</option>
                </select>
            </div>

            <button type="submit">Calcular Salario</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Calculando...</p>
        </div>

        <div class="result" id="result">
            <h2>Salario Estimado</h2>
            <div class="salary" id="salaryAmount">$0</div>
        </div>

        <div class="error" id="error">
            <strong>Error:</strong> <span id="errorMessage"></span>
        </div>
    </div>

    <script>
        document.getElementById('salaryForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Obtener valores del formulario
            const experience = parseFloat(document.getElementById('experience').value);
            const education = document.getElementById('education').value;

            // Validar
            if (!education) {
                showError('Por favor selecciona un nivel de educación');
                return;
            }

            if (experience < 0 || experience > 15) {
                showError('Los años de experiencia deben estar entre 0 y 15');
                return;
            }

            // Ocultar mensajes anteriores
            hideMessages();
            showLoading();

            try {
                // Hacer la petición a la API
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        YearsExperience: experience,
                        EducationLevel: education
                    })
                });

                const data = await response.json();
                hideLoading();

                if (response.ok && data.prediction) {
                    // Mostrar resultado
                    showResult(data.prediction);
                } else {
                    showError(data.error || 'Error al calcular el salario');
                }
            } catch (error) {
                hideLoading();
                showError('Error de conexión. Por favor intenta de nuevo.');
                console.error('Error:', error);
            }
        });

        function showResult(salary) {
            const resultDiv = document.getElementById('result');
            const salaryAmount = document.getElementById('salaryAmount');

            // Formatear número con separador de miles
            const formattedSalary = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 0
            }).format(salary);

            salaryAmount.textContent = formattedSalary;
            resultDiv.classList.add('show');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorDiv.classList.add('show');
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        function hideMessages() {
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');
        }
    </script>
</body>
</html>
